[defaults]
host_key_checking = False
inventory = ./
#log_path=/var/log/ansible.cfg
private_key_file=~/.ssh/wserver-access.pem
#private_key_file=~/.ssh/devuser-kp
interpreter_python=/usr/bin/python3
ansible_user=ubuntu

[privilege_escalation]
become=True
become_method=sudo
become_user=root
become_ask_pass=False

[inventory]
enable_plugins = amazon.aws.aws_ec2, aws_ec2, yaml, ini
