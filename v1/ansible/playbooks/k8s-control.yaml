---
- name: Initialize Kubernetes control plane
  hosts: control
  become: true
  gather_facts: false
  tasks:
    - name: Check if cluster is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_admin_conf

    - name: Initialize Kubernetes cluster (CLI arguments)
      command: >
        kubeadm init \
        --control-plane-endpoint {{ control_public_dns }} \
        --apiserver-cert-extra-sans {{ control_public_dns }} \
        --pod-network-cidr={{ pod_cidr }}
      args:
        creates: /etc/kubernetes/admin.conf
      register: kubeadm_init
      when: not k8s_admin_conf.stat.exists

    - name: Show kubeadm init output
      debug:
        var: kubeadm_init.stdout_lines
      when: kubeadm_init is defined

    - name: Render kubeadm config
      template:
        src: ../templates/kubeadm-config.yaml.j2
        dest: /tmp/kubeadm-config.yaml
      when: not k8s_admin_conf.stat.exists

    - name: Initialize Kubernetes cluster
      command: kubeadm init --config /tmp/kubeadm-config.yaml
      args:
        creates: /etc/kubernetes/admin.conf
      register: kubeadm_init
      when: not k8s_admin_conf.stat.exists

    - name: Show kubeadm init output
      debug:
        var: kubeadm_init.stdout_lines
      when: kubeadm_init is defined

    - name: Create .kube directory
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy admin.conf to user kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Install Calico CNI
      become_user: ubuntu
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      ansible.builtin.shell: |
        aws s3 cp s3://kube-cluster-config/calico/3.30.3/manifests/operator-crds.yaml /tmp/operator-crds.yaml
        aws s3 cp s3://kube-cluster-config/calico/3.30.3/manifests/tigera-operator.yaml /tmp/tigera-operator.yaml
        aws s3 cp s3://kube-cluster-config/calico/3.30.3/manifests/custom-resources.yaml /tmp/custom-resources.yaml
        kubectl create -f /tmp/operator-crds.yaml
        kubectl create -f /tmp/tigera-operator.yaml
        kubectl create -f /tmp/custom-resources.yaml
      when: not k8s_admin_conf.stat.exists

